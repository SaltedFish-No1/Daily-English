    <script>
        let lessonData = {};

        try {
            lessonData = JSON.parse(document.getElementById('lesson-data').textContent);
        } catch (error) {
            lessonData = {};
        }

        const meta = lessonData.meta || {};
        const ui = lessonData.ui || {};
        const article = lessonData.article || {};
        const chart = lessonData.chart || {};
        const quiz = lessonData.quiz || {};
        const speech = lessonData.speech || {};
        const vocabData = lessonData.vocab || {};
        const quizQuestions = quiz.questions || [];
        const chartInsights = chart.insights || [];
        const chartDatasets = chart.datasets || [];

        let currentTabId = 'article';
        let chartInstance = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let questionAnswered = false;

        function getValue(value, fallback = '') {
            return value === undefined || value === null || value === '' ? fallback : value;
        }

        function setText(id, value) {
            document.getElementById(id).innerText = getValue(value);
        }

        function setHTML(id, value) {
            document.getElementById(id).innerHTML = getValue(value);
        }

        function getArticleParagraphs() {
            if (Array.isArray(article.paragraphs)) {
                return article.paragraphs;
            }
            if (typeof article.html === 'string' && article.html.trim()) {
                return [article.html];
            }
            return [];
        }

        function getToneClasses(tone) {
            const tones = {
                slate: {
                    iconBg: 'bg-slate-100',
                    iconText: 'text-slate-600'
                },
                emerald: {
                    iconBg: 'bg-emerald-100',
                    iconText: 'text-emerald-600'
                },
                orange: {
                    iconBg: 'bg-orange-100',
                    iconText: 'text-orange-600'
                },
                red: {
                    iconBg: 'bg-red-100',
                    iconText: 'text-red-600'
                },
                blue: {
                    iconBg: 'bg-blue-100',
                    iconText: 'text-blue-600'
                }
            };

            return tones[tone] || tones.slate;
        }

        function speakWord(word) {
            if (!speech.enabled) {
                return;
            }

            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = getValue(speech.lang, 'en-US');
                utterance.rate = getValue(speech.rate, 0.9);
                window.speechSynthesis.speak(utterance);
            } else {
                alert(getValue(speech.unsupportedMessage, "Sorry, your browser doesn't support text to speech."));
            }
        }

        function buildVocabContent(word, data) {
            const speechButton = speech.enabled
                ? `
                    <button type="button" onclick='speakWord(${JSON.stringify(getValue(data.speakText, word))})' class="text-emerald-600 hover:text-emerald-700 active:scale-95 transition-transform text-2xl focus:outline-none" title="${getValue(ui.listenTitle, 'Listen to pronunciation')}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-7 sm:w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                        </svg>
                    </button>
                `
                : '';

            return `
                <div class="flex items-center gap-3 mb-2 flex-wrap">
                    <h3 class="text-2xl sm:text-3xl font-bold text-slate-900 capitalize flex items-center gap-2">
                        ${word}
                        ${speechButton}
                    </h3>
                    <span class="inline-block bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-md font-mono font-bold">${getValue(data.pos)}</span>
                </div>
                <p class="text-slate-600 font-medium mb-6 text-base leading-relaxed">${getValue(data.def)}</p>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <span class="text-[11px] text-slate-400 uppercase tracking-widest font-bold block mb-1">${getValue(ui.translationLabel, 'Chinese Translation')}</span>
                    <p class="text-emerald-700 font-bold text-lg">${getValue(data.trans)}</p>
                </div>
            `;
        }

        function bindVocabEvents() {
            document.querySelectorAll('.vocab-word').forEach(wordEl => {
                wordEl.addEventListener('click', function(event) {
                    event.stopPropagation();
                    const word = this.getAttribute('data-word');
                    const data = vocabData[word];

                    if (!data) {
                        return;
                    }

                    document.querySelectorAll('.vocab-word').forEach(el => el.classList.remove('vocab-active'));
                    this.classList.add('vocab-active');

                    document.getElementById('vocab-placeholder').classList.add('hidden');
                    const contentDiv = document.getElementById('vocab-content');
                    contentDiv.classList.remove('hidden');
                    contentDiv.innerHTML = buildVocabContent(word, data);

                    if (window.innerWidth < 1024) {
                        openMobileVocabPanel();
                    }
                });
            });
        }

        function renderArticle() {
            const paragraphs = getArticleParagraphs();
            const content = paragraphs.map(paragraph => `<p class="mb-5">${paragraph}</p>`).join('');
            setHTML('article-content', content);
            bindVocabEvents();
        }

        function renderInsights() {
            const container = document.getElementById('chart-insights');

            if (!chartInsights.length) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = chartInsights.map(insight => {
                const tone = getToneClasses(insight.tone);
                return `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-8 h-8 rounded-full ${tone.iconBg} flex items-center justify-center ${tone.iconText} text-xs">${getValue(insight.icon)}</div>
                            <h3 class="font-bold text-slate-800 text-base">${getValue(insight.title)}</h3>
                        </div>
                        <p class="text-sm text-slate-600">${getValue(insight.text)}</p>
                    </div>
                `;
            }).join('');
        }

        function applyStaticContent() {
            document.title = getValue(meta.pageTitle, getValue(meta.title, 'Daily English Lesson'));

            setText('page-title', getValue(meta.title));
            setText('page-subtitle', getValue(meta.subtitle));

            setText('desktop-tab-article', getValue(ui.desktopArticleTabLabel, 'Reading & Vocab'));
            setText('desktop-tab-data', getValue(ui.desktopDataTabLabel, 'Health Trends'));
            setText('desktop-tab-quiz', getValue(ui.desktopQuizTabLabel, 'Knowledge Check'));

            setText('mobile-tab-article-label', getValue(ui.mobileArticleTabLabel, 'Reading'));
            setText('mobile-tab-data-label', getValue(ui.mobileDataTabLabel, 'Trends'));
            setText('mobile-tab-quiz-label', getValue(ui.mobileQuizTabLabel, 'Quiz'));

            setHTML('article-hint', getValue(ui.articleHintHtml));
            setText('article-title', getValue(article.title));
            setText('vocab-placeholder-text', getValue(ui.vocabPlaceholderText, 'Select a highlighted word to view its analysis.'));

            setText('chart-title', getValue(chart.title));
            setText('chart-description', getValue(chart.description));

            setText('quiz-title', getValue(quiz.title, 'Knowledge Check'));
            setText('quiz-description', getValue(quiz.description, 'Test your comprehension of the vocabulary and concepts.'));
            setText('quiz-complete-title', getValue(quiz.completeTitle, 'Quiz Complete!'));
            setText('retake-quiz-btn', getValue(quiz.retakeButtonLabel, 'Retake Quiz'));
            setText('quiz-result-prefix', getValue(quiz.resultPrefix, 'You scored'));
            setText('quiz-result-suffix', getValue(quiz.resultSuffix, 'out of'));
            setText('quiz-result-total', quizQuestions.length);
            setText('next-btn', getValue(quiz.nextButtonLabel, 'Next Question'));

            renderArticle();
            renderInsights();
            updateScoreDisplay();
            document.getElementById('quiz-progress').innerText = `Q 1 / ${quizQuestions.length}`;
        }

        function switchTab(tabId) {
            document.getElementById(`desktop-tab-${currentTabId}`).classList.remove('tab-active-desktop', 'text-emerald-600');
            document.getElementById(`desktop-tab-${currentTabId}`).classList.add('border-transparent', 'text-slate-500');
            document.getElementById(`mobile-tab-${currentTabId}`).classList.remove('text-emerald-600');
            document.getElementById(`mobile-tab-${currentTabId}`).classList.add('text-slate-400');
            document.getElementById(`view-${currentTabId}`).classList.add('hidden');

            document.getElementById(`desktop-tab-${tabId}`).classList.add('tab-active-desktop', 'text-emerald-600');
            document.getElementById(`desktop-tab-${tabId}`).classList.remove('border-transparent', 'text-slate-500');
            document.getElementById(`mobile-tab-${tabId}`).classList.add('text-emerald-600');
            document.getElementById(`mobile-tab-${tabId}`).classList.remove('text-slate-400');
            document.getElementById(`view-${tabId}`).classList.remove('hidden');

            const wrapper = document.getElementById('vocab-wrapper');
            if (tabId === 'article') {
                wrapper.classList.remove('lg:hidden');
                wrapper.classList.add('lg:block');
            } else {
                wrapper.classList.remove('lg:block');
                wrapper.classList.add('lg:hidden');
            }

            currentTabId = tabId;
            closeMobileVocabPanel();

            if (tabId === 'data' && !chartInstance && chartDatasets.length) {
                setTimeout(initChart, 50);
            }

            if (tabId === 'quiz' && quizQuestions.length && currentQuestionIndex === 0 && score === 0 && !questionAnswered) {
                initQuiz();
            }

            window.scrollTo({ top: 0, behavior: 'auto' });
        }

        const vocabWrapper = document.getElementById('vocab-wrapper');
        const overlay = document.getElementById('mobile-overlay');
        const vocabPanel = document.getElementById('vocab-panel');
        let touchStartY = 0;

        function openMobileVocabPanel() {
            overlay.classList.remove('hidden');
            void overlay.offsetWidth;
            overlay.classList.remove('opacity-0');
            overlay.classList.add('opacity-100');
            vocabWrapper.classList.remove('translate-y-full');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileVocabPanel() {
            vocabWrapper.classList.add('translate-y-full');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');

            setTimeout(() => {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);

            document.querySelectorAll('.vocab-word').forEach(el => el.classList.remove('vocab-active'));
        }

        document.getElementById('close-vocab-btn').addEventListener('click', closeMobileVocabPanel);
        document.getElementById('close-vocab-bar').addEventListener('click', closeMobileVocabPanel);
        overlay.addEventListener('click', closeMobileVocabPanel);

        vocabPanel.addEventListener('touchstart', event => {
            touchStartY = event.touches[0].clientY;
        }, { passive: true });

        vocabPanel.addEventListener('touchmove', event => {
            const touchY = event.touches[0].clientY;
            if (vocabPanel.scrollTop <= 0 && touchY > touchStartY + 50) {
                closeMobileVocabPanel();
            }
        }, { passive: true });

        function initChart() {
            const ctx = document.getElementById('lessonChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: getValue(chart.type, 'line'),
                data: {
                    labels: chart.labels || [],
                    datasets: chartDatasets.map(dataset => ({
                        ...dataset,
                        pointRadius: getValue(dataset.pointRadius, window.innerWidth < 640 ? 4 : 5),
                        pointHoverRadius: getValue(dataset.pointHoverRadius, window.innerWidth < 640 ? 6 : 8)
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            position: 'top',
                            align: 'start',
                            labels: {
                                usePointStyle: true,
                                boxWidth: 8,
                                padding: 15,
                                font: {
                                    family: 'Inter',
                                    size: window.innerWidth < 640 ? 11 : 13,
                                    weight: '500'
                                },
                                color: '#475569'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(255, 255, 255, 0.95)',
                            titleColor: '#0f172a',
                            bodyColor: '#475569',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6,
                            titleFont: { size: 14, family: 'Inter', weight: 'bold' },
                            bodyFont: { size: 13, family: 'Inter' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: getValue(chart.yBeginAtZero, false),
                            min: chart.yMin,
                            max: chart.yMax,
                            title: {
                                display: window.innerWidth >= 640 && !!chart.yAxisTitle,
                                text: getValue(chart.yAxisTitle),
                                font: { family: 'Inter', size: 12 }
                            },
                            grid: { color: '#f1f5f9' },
                            border: { display: false }
                        },
                        x: {
                            grid: { display: false },
                            border: { display: false }
                        }
                    }
                }
            });
        }

        function initQuiz() {
            if (!quizQuestions.length) {
                return;
            }

            currentQuestionIndex = 0;
            score = 0;
            questionAnswered = false;
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('quiz-results').classList.add('hidden');
            updateScoreDisplay();
            renderQuestion();
        }

        function renderQuestion() {
            questionAnswered = false;
            const qData = quizQuestions[currentQuestionIndex];

            document.getElementById('quiz-progress').innerText = `Q ${currentQuestionIndex + 1} / ${quizQuestions.length}`;
            document.getElementById('question-text').innerText = qData.q;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            qData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left p-5 sm:p-6 rounded-xl border-2 border-slate-100 hover:border-emerald-400 hover:bg-emerald-50 active:bg-emerald-100 transition-all font-medium text-slate-700 bg-white text-base sm:text-lg leading-snug shadow-sm';
                button.innerText = option.text;
                button.onclick = () => handleAnswer(index);
                optionsContainer.appendChild(button);
            });

            document.getElementById('feedback-block').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function handleAnswer(selectedIndex) {
            if (questionAnswered) {
                return;
            }

            questionAnswered = true;
            const qData = quizQuestions[currentQuestionIndex];
            const isCorrect = qData.options[selectedIndex].correct;
            const rationale = qData.options[selectedIndex].rationale;
            const buttons = document.getElementById('options-container').children;

            for (let index = 0; index < buttons.length; index++) {
                buttons[index].disabled = true;
                buttons[index].classList.remove('hover:border-emerald-400', 'hover:bg-emerald-50', 'active:bg-emerald-100', 'cursor-pointer', 'shadow-sm');
                buttons[index].classList.add('opacity-50', 'border-slate-100');

                if (qData.options[index].correct) {
                    buttons[index].classList.remove('opacity-50');
                    buttons[index].classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-900');
                    buttons[index].innerHTML = `<span class="font-bold mr-2 text-emerald-600 text-xl align-middle">✓</span> <span class="align-middle">${buttons[index].innerText}</span>`;
                } else if (index === selectedIndex && !isCorrect) {
                    buttons[index].classList.remove('opacity-50');
                    buttons[index].classList.add('border-red-400', 'bg-red-50', 'text-red-900');
                    buttons[index].innerHTML = `<span class="font-bold mr-2 text-red-500 text-xl align-middle">✗</span> <span class="align-middle">${buttons[index].innerText}</span>`;
                }
            }

            if (isCorrect) {
                score++;
            }

            updateScoreDisplay();

            const feedbackBlock = document.getElementById('feedback-block');
            const feedbackText = document.getElementById('feedback-text');
            const feedbackRationale = document.getElementById('feedback-rationale');

            feedbackBlock.classList.remove('hidden', 'bg-emerald-50', 'border-emerald-200', 'text-emerald-900', 'bg-red-50', 'border-red-200', 'text-red-900');

            if (isCorrect) {
                feedbackBlock.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-900');
                feedbackText.innerHTML = `<span>🎉</span> ${getValue(quiz.correctLabel, 'Correct!')}`;
            } else {
                feedbackBlock.classList.add('bg-red-50', 'border-red-200', 'text-red-900');
                feedbackText.innerHTML = `<span>💡</span> ${getValue(quiz.incorrectLabel, 'Incorrect')}`;
            }

            feedbackRationale.innerText = rationale;

            const nextButton = document.getElementById('next-btn');
            nextButton.classList.remove('hidden');
            if (currentQuestionIndex === quizQuestions.length - 1) {
                nextButton.innerText = getValue(quiz.viewResultsButtonLabel, 'View Results');
            } else {
                nextButton.innerText = getValue(quiz.nextButtonLabel, 'Next Question');
            }

            if (window.innerWidth < 640) {
                setTimeout(() => {
                    nextButton.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }, 100);
            }
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) {
                renderQuestion();
                window.scrollTo({ top: 0, behavior: 'auto' });
            } else {
                showResults();
            }
        });

        function updateScoreDisplay() {
            document.getElementById('quiz-score-display').innerText = `${getValue(quiz.scoreLabel, 'Score')}: ${score}`;
        }

        function showResults() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('quiz-results').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }

        applyStaticContent();

        if (!quizQuestions.length) {
            document.getElementById('quiz-container').classList.add('hidden');
        }
    </script>
</body>
</html>
