<!DOCTYPE html>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Cooler, cleaner background for mobile app feel */

            -webkit-tap-highlight-color: transparent; /* Remove blue flash on mobile tap */

        h1, h2, h3, .serif {
            font-family: 'Merriweather', serif;
        }

        /* Mobile safe area padding for bottom nav */
